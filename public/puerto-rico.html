<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1c5e8c" />
  <title>Isla de Poder — Puerto Rico World Sim</title>
  <link rel="stylesheet" href="puerto-rico.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-row">
      <h1 class="brand">🏝️ Isla de Poder</h1>
      <button id="settingsToggle" class="icon-btn" aria-label="Trait editor">⚙️</button>
    </div>
    <p class="tagline">A WorldBox-style battle for Puerto Rico: 🔵 PNP · 🔴 PPD · 🟢 Independentistas</p>
  </header>

  <div class="controls">
    <button id="playBtn" class="btn btn-primary">▶ Play</button>
    <button id="stepBtn" class="btn btn-ghost">⏭ Step</button>
    <button id="resetBtn" class="btn btn-ghost">↺ Reset</button>
    <label class="speed">
      Speed
      <input id="speed" type="range" min="1" max="8" step="1" value="3" />
      <span id="speedVal">3×</span>
    </label>
    <span class="tick">Tick <b id="tickVal">0</b></span>
  </div>

  <main class="layout">
    <section class="board">
      <div class="canvas-wrap">
        <canvas id="world"></canvas>
        <div class="zoom-controls">
          <button id="zoomIn" class="zoom-btn" aria-label="Zoom in">+</button>
          <button id="zoomOut" class="zoom-btn" aria-label="Zoom out">−</button>
          <button id="zoomFit" class="zoom-btn" aria-label="Fit map">⤢</button>
        </div>
        <div id="winBanner" class="win-banner hidden"></div>
      </div>

      <div class="tools">
        <div id="civPicker" class="civ-picker"></div>
        <div id="powerList" class="power-list"></div>
        <p id="toolHint" class="tool-hint">Pick a power, then click the map.</p>
      </div>
    </section>

    <aside class="side">
      <section id="stats" class="stats"></section>
      <section class="log">
        <h2>Crónica de la Isla</h2>
        <ul id="eventLog" class="event-log"></ul>
      </section>
    </aside>
  </main>

  <!-- Trait editor -->
  <div id="settingsOverlay" class="overlay hidden">
    <div class="panel">
      <div class="panel-head">
        <h2>Trait Editor</h2>
        <button id="settingsClose" class="icon-btn" aria-label="Close">✕</button>
      </div>
      <p class="panel-sub">Tweak each party's DNA (0–10). Changes apply on the next Reset.</p>
      <div id="traitEditor" class="trait-editor"></div>
      <button id="resetTraits" class="btn btn-ghost full">Reset traits to defaults</button>
    </div>
  </div>

  <script type="module" src="pr/main.js"></script>
</body>
</html>
