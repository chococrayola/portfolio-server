<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1c5e8c" />
  <title>Isla de Poder — Simulación de Puerto Rico</title>
  <link rel="stylesheet" href="puerto-rico.css?v=26" />
</head>
<body>
  <header class="topbar" id="statusBar">
    <div class="status-main">
      <span class="brand">🏝️ Isla de Poder</span>
      <span class="ver">v26</span>
      <span id="clock" class="clock">—</span>
      <span id="ticker" class="ticker">El mundo despierta…</span>
      <button id="settingsToggle" class="icon-btn" aria-label="Editor de rasgos">⚙️</button>
    </div>
    <div id="partyStrip" class="party-strip"></div>
  </header>

  <div class="controls">
    <button id="playBtn" class="btn btn-primary">▶ Jugar</button>
    <button id="stepBtn" class="btn btn-ghost">⏭ Paso</button>
    <button id="resetBtn" class="btn btn-ghost">↺ Reiniciar</button>
    <label class="speed">
      Velocidad
      <input id="speed" type="range" min="1" max="8" step="1" value="3" />
      <span id="speedVal">3×</span>
    </label>
    <label class="pick">Poder
      <select id="powerSelect"></select>
    </label>
    <label class="pick" id="partyPickWrap">Partido
      <select id="partySelect"></select>
    </label>
    <span class="tick">Turno <b id="tickVal">0</b></span>
  </div>
  <p id="toolHint" class="tool-hint">Elige un poder y toca el mapa.</p>

  <!-- Tablero tipo dashboard: mapa + paneles al lado -->
  <div class="game">
    <main class="board">
      <div class="canvas-wrap">
        <canvas id="world"></canvas>
        <div class="zoom-controls">
          <button id="zoomIn" class="zoom-btn" aria-label="Acercar">+</button>
          <button id="zoomOut" class="zoom-btn" aria-label="Alejar">−</button>
          <button id="zoomFit" class="zoom-btn" aria-label="Ver todo">⤢</button>
        </div>
        <div id="winBanner" class="win-banner hidden"></div>
      </div>
    </main>

    <!-- Debajo del mapa: tablero de líderes (en móvil aparece justo tras el mapa) -->
    <section class="left-wide">
      <h2 class="dash-title">Tablero de líderes</h2>
      <div id="stats" class="stats"></div>
    </section>

    <!-- Columna derecha: Historia arriba, luego las gráficas en vivo -->
    <section class="side-charts">
      <h2 class="dash-title">Historia</h2>
      <ul id="eventLog" class="event-log big modern"></ul>

      <h2 class="dash-title">Gráficas en vivo · evolución en el tiempo</h2>
      <div id="chartLegend" class="chart-legend"></div>
      <div id="chartsGrid" class="charts-grid"></div>
    </section>
  </div>

  <!-- Character / city inspector -->
  <div id="inspector" class="inspector hidden">
    <button id="inspClose" class="icon-btn insp-close" aria-label="Close">✕</button>
    <div id="inspBody"></div>
  </div>

  <!-- Trait editor -->
  <div id="settingsOverlay" class="overlay hidden">
    <div class="panel">
      <div class="panel-head">
        <h2>Editor de Rasgos</h2>
        <button id="settingsClose" class="icon-btn" aria-label="Cerrar">✕</button>
      </div>
      <p class="panel-sub">Ajusta el ADN de cada partido (0–10). Los cambios aplican al Reiniciar.</p>
      <div id="traitEditor" class="trait-editor"></div>
      <button id="resetTraits" class="btn btn-ghost full">Restaurar rasgos por defecto</button>
    </div>
  </div>

  <script type="module" src="pr/main.js?v=26"></script>
</body>
</html>
